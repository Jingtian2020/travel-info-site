name: Weekly Travel Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Refresh travel data
        shell: pwsh
        run: ./scripts/update-travel-data.ps1

      - name: Commit refreshed data if changed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/travel-data.js
          git commit -m "chore: weekly refresh travel content"
          git push
